name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  build-pages:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Provide links.json (fall back to example)
        run: '[ -f src/links.json ] || cp src/links.example.json src/links.json'
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: src

  deploy-pages:
    needs: build-pages
    environment:
      name: github-pages
      url: ${{ fromJSON(steps.deployment.outputs.outputs).page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: Wandalen/wretry.action@v3
        with:
          action: actions/deploy-pages@v5
          attempt_limit: 3
          attempt_delay: 15000
