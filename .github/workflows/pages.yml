name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-pages:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Provide links.json (fall back to example)
        run: '[ -f src/links.json ] || cp src/links.example.json src/links.json'
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: src

  deploy-pages:
    needs: build-pages
    environment:
      name: github-pages
      url: ${{ fromJSON(steps.deployment.outputs.outputs).page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: Wandalen/wretry.action@v3
        with:
          action: actions/deploy-pages@v5
          attempt_limit: 3
          attempt_delay: 15000
