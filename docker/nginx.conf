server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    error_page 404 /404.html;

    # scripts/fingerprint.py hashes assets/ and links.json into
    # assets-<hash>/ and data-<hash>/ at build time -- a new deploy always
    # produces new folder names, so it's safe to tell the browser it never
    # needs to revalidate a file under either one.
    location ~* "^/(assets|data)-[0-9a-f]{10}/" {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Everything else -- including index.html and 404.html, reached here via
    # the `index` directive / `error_page`'s internal redirect. These are
    # exactly the files that reference the *current* hashed folder names, so
    # a stale cached copy would point at folders a new deploy already
    # replaced. `always` is needed because add_header is skipped on 404
    # responses by default, and the custom 404 page is served with that
    # status.
    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ =404;
    }
}
